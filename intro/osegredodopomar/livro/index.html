/* Legenda */
.legenda {
    position: absolute;
    bottom: 15%;
    width: 80%;
left: 50%;
transform: translateX(-50%);
    text-align: center;
    color: white;
    font-size: 2rem;
    font-weight: bold;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);

    opacity: 0;
    transition: opacity 0.3s ease;

    z-index: 10;
    pointer-events: none;

    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 10px;
}
.legenda-top {
    top: 3%;
    bottom: auto;
}

.legenda-bottom {
    bottom: 10%;
    top: auto;
}

.legenda-middle {
    top: 50%;
    bottom: auto;

    transform: translate(-50%, -50%);
}

.legenda span {
    transition: color 0.3s ease;
}

.palavra-ativa {
    color: yellow;
}

<script>
const carousel = document.getElementById("carousel");
const slides = document.querySelectorAll(".slide");
let startY = 0;
let currentIndex = 0;
const playBtn = document.getElementById("playButton");
const btnIcon = document.getElementById("btnIcon");
let isPlaying = false;

function updateButtonIcon(isAudioPlaying) {
  const btn = document.getElementById("playButton");
  btn.classList.add("animate");

  setTimeout(() => {
    btnIcon.src = isAudioPlaying ? "images/stop-icon.png" : "images/play-icon.png";
    btn.classList.remove("animate");
  }, 150);
}

function showSlide(index) {
  if (index === currentIndex) return;

  // 1. Toca o som de transição e move o carrossel imediatamente
  document.getElementById("transitionSound").play().catch(() => {});
  carousel.style.transform = `translateY(-${index * 100}vh)`;

  // 2. Para todos os áudios que estavam tocando antes
  slides.forEach((slide, i) => {
    const audio = slide.querySelector("audio");
    if (audio && i !== index) {
      audio.pause();
      audio.currentTime = 0;
    }
  });

  // 3. Aguarda a animação terminar (1s) para tocar o novo áudio e sincronizar
  setTimeout(() => {
    const currentAudio = slides[index].querySelector("audio");
    if (currentAudio) {
      currentAudio.play().then(() => {
        isPlaying = true;
        updateButtonIcon(true);
        
        // Chamada da sincronização para o texto aparecer
        iniciarSincronizacao(currentAudio, index);
        
      }).catch(() => {});
    }
  }, 1000);

  currentIndex = index;
}

function stopAllAudio() {
  slides.forEach(slide => {
    const audio = slide.querySelector("audio");
    if (audio) {
      audio.pause();
      audio.currentTime = 0;
    }
  });
  isPlaying = false;
  updateButtonIcon(false);
}

carousel.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
});

carousel.addEventListener("touchend", (e) => {
  let endY = e.changedTouches[0].clientY;
  let previousIndex = currentIndex;

  if (startY - endY > 50 && currentIndex < slides.length - 1) {
    showSlide(currentIndex + 1);
  } else if (endY - startY > 50 && currentIndex > 0) {
    showSlide(currentIndex - 1);
  }
});

playBtn.addEventListener("click", () => {
  const currentAudio = slides[currentIndex].querySelector("audio");
  if (isPlaying) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    isPlaying = false;
    updateButtonIcon(false);
  } else {
    currentAudio.play().then(() => {
      isPlaying = true;
      updateButtonIcon(true);
    }).catch(() => {});
  }
});

window.onload = () => {
  const currentAudio = slides[0].querySelector("audio");
  
  setTimeout(() => {
    if (currentAudio) {
      currentAudio.play().then(() => {
        isPlaying = true;
        updateButtonIcon(true);
        
        // ESTA LINHA ABAIXO É A QUE ESTAVA FALTANDO:
        iniciarSincronizacao(currentAudio, 0); 
        
      }).catch((error) => {
        console.log("O áudio aguarda interação do usuário.");
      });
    }
  }, 1000);

  currentAudio.addEventListener("ended", () => {
    isPlaying = false;
    updateButtonIcon(false);
  });
};

slides.forEach(slide => {
  const audio = slide.querySelector("audio");
  if (audio) {
    audio.addEventListener("ended", () => {
      isPlaying = false;
      updateButtonIcon(false);
    });
  }
});</script>

<script>
async function baixarImagem() {

  // som
  const sound = document.getElementById('downloadSound');
  if (sound) {
    sound.play().catch(() => {});
  }

  // número da página
  const numeroArquivo = (currentIndex + 1)
    .toString()
    .padStart(2, '0');

  // caminho da imagem
  const caminhoImagem = `images/color${numeroArquivo}.jpeg`;

  try {

    // carrega a imagem
    const response = await fetch(caminhoImagem);

    const blob = await response.blob();

    // cria url temporária
    const url = window.URL.createObjectURL(blob);

    // cria link
    const link = document.createElement('a');

    link.href = url;

    link.download = `arte_para_colorir_${numeroArquivo}.jpeg`;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    // limpa memória
    window.URL.revokeObjectURL(url);

  } catch (erro) {

    console.log("Erro ao baixar imagem:", erro);

  }
}
</script>

<!-- O mapa segue a lógica da sua imagem -->

<script>



function iniciarSincronizacao(audioElement, slideIndex) {

  const displayTexto = document.getElementById(`legenda${slideIndex}`);
  const mapa = scriptsDasHistorias[slideIndex];

  if (!mapa || !displayTexto) return;

  let ultimoTexto = null;

  audioElement.ontimeupdate = () => {

    const tempoAtual = audioElement.currentTime;

    const fraseAtual = [...mapa]
      .reverse()
      .find(p => tempoAtual >= p.tempo);

    const novoTexto = fraseAtual
      ? JSON.stringify(fraseAtual.texto)
      : "";

    if (novoTexto !== ultimoTexto) {

      ultimoTexto = novoTexto;

      if (fraseAtual && fraseAtual.texto !== "") {

        displayTexto.classList.remove(
          "legenda-top",
          "legenda-bottom",
          "legenda-middle"
        );

        if (fraseAtual.posicao === "top") {
          displayTexto.classList.add("legenda-top");
        }

        if (fraseAtual.posicao === "bottom") {
          displayTexto.classList.add("legenda-bottom");
        }

        if (fraseAtual.posicao === "middle") {
          displayTexto.classList.add("legenda-middle");
        }

        displayTexto.style.transition = "opacity 6s ease";

        animarPalavras(fraseAtual.texto, displayTexto);

        requestAnimationFrame(() => {
          displayTexto.style.opacity = "1";
        });

      } else {

        displayTexto.style.transition = "opacity 4.5s ease";

        displayTexto.style.opacity = "0";

        setTimeout(() => {
          displayTexto.innerHTML = "";
        }, 6000);
      }
    }
  };
}





function animarPalavras(palavras, displayTexto) {

  displayTexto.innerHTML = palavras
    .map(p => `<span>${p.palavra}</span>`)
    .join(" ");

  const spans = displayTexto.querySelectorAll("span");

  let index = 0;

  function proximaPalavra() {

    if (index > 0) {
      spans[index - 1].classList.remove("palavra-ativa");
    }

    if (index < spans.length) {

      spans[index].classList.add("palavra-ativa");

      const tempoAtual = palavras[index].tempo;

      index++;

      setTimeout(proximaPalavra, tempoAtual);

    } else {

      spans.forEach(s => {
        s.classList.remove("palavra-ativa");
      });
    }
  }

  proximaPalavra();
}

</script>
